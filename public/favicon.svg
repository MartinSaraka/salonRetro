<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="vintage-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f1ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4c5b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b7355;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="url(#vintage-gradient)"/>
  
  <!-- Border -->
  <rect x="5" y="5" width="90" height="90" fill="none" stroke="#3d2817" stroke-width="3"/>
  <rect x="8" y="8" width="84" height="84" fill="none" stroke="#b8935e" stroke-width="1"/>
  
  <!-- Scissors icon -->
  <g transform="translate(50, 50)">
    <!-- Left handle -->
    <circle cx="-15" cy="-10" r="6" fill="none" stroke="#3d2817" stroke-width="2"/>
    <!-- Right handle -->
    <circle cx="15" cy="-10" r="6" fill="none" stroke="#3d2817" stroke-width="2"/>
    <!-- Blades -->
    <line x1="-15" y1="-10" x2="0" y2="15" stroke="#3d2817" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="-10" x2="0" y2="15" stroke="#3d2817" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center pivot -->
    <circle cx="0" cy="5" r="2" fill="#b8935e"/>
  </g>
</svg>
